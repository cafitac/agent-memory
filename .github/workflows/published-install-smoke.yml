name: published-install-smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Published version to verify, without the leading v'
        required: true
        type: string
      attempts:
        description: 'Retry attempts for registry propagation'
        required: false
        default: '18'
        type: string
      propagation_attempts:
        description: 'Longer retry budget for propagation-like resolver failures'
        required: false
        default: '36'
        type: string
      propagation_delay_seconds:
        description: 'Base exponential backoff delay for propagation-like resolver failures'
        required: false
        default: '20'
        type: string

jobs:
  published-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pipx for published package smoke
        run: |
          uv venv
          uv pip install pipx
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run published install smoke matrix
        run: |
          mkdir -p .artifacts
          uv run python scripts/smoke_published_install.py \
            --version "${{ inputs.version }}" \
            --attempts "${{ inputs.attempts }}" \
            --delay-seconds 10 \
            --propagation-attempts "${{ inputs.propagation_attempts }}" \
            --propagation-delay-seconds "${{ inputs.propagation_delay_seconds }}" \
            --output-json .artifacts/published-install-smoke.json

      - name: Upload published install smoke result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: published-install-smoke-result
          path: .artifacts/published-install-smoke.json
          if-no-files-found: ignore
